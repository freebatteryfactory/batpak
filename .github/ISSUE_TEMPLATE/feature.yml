name: Feature request
description: Propose a crate capability, DX improvement, or documentation enhancement
title: "[feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is hard today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What would a successful improvement look like?
