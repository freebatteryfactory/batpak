name: Integrity CI

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  # Every merge runs the always-on lane set on main. This is load-bearing for
  # PR wall-clock, not ceremony: GitHub Actions only shares caches DOWNWARD
  # from the default branch, so rust-cache/devcontainer layers saved by PR
  # runs (scoped to refs/pull/N/merge) are invisible to every other PR. The
  # main run is what seeds the warm cache every PR restores from — without it
  # each PR compiles every lane cold. It also re-proves main after rebase
  # merges whose base had drifted from the PR's last green run.
  push:
    branches: [main]
  workflow_dispatch:
    # Default manual runs are intentionally cheap. Choose an explicit proof
    # profile when you want to spend hosted CI minutes on deeper evidence.
    inputs:
      proof:
        description: "Proof profile to run"
        required: true
        default: fast
        type: choice
        options:
          - fast
          - verify
          - windows
          - mutants
          - loom
          - chaos
          - heavy
          - bless
      run_full_mutation_matrix:
        description: >-
          COST GUARD. The 24-shard whole-repo mutation matrix is the single
          heaviest surface in this repo — a release-candidate / scheduled
          #49-baseline tool, never routine. On free hosted runners (4 vCPU) a
          shard likely exceeds the 6-hour job cap; re-sharding for hosted
          runners is owned by the Muterprater arm (#211). `proof=heavy` runs
          every validation lane EXCEPT this matrix; to also run the matrix you
          must explicitly set this to `yes`. Default `no` makes casual
          triggering impossible.
        required: false
        default: "no"
        type: choice
        options:
          - "no"
          - "yes"
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Least-privilege pin for every job's GITHUB_TOKEN. The repo setting already
# defaults to read-only (`default_workflow_permissions: read`); this makes the
# posture explicit IN the workflow so a future settings drift cannot silently
# widen it. Jobs that genuinely need more (the docs Pages deploy) declare
# their own job-level block, which overrides this one.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # tests/common/proptest.rs treats this as a floor, not an exact override:
  # small fast tests can be lifted upward in CI without silently capping
  # deeper fuzz/property surfaces that already ask for more.
  PROPTEST_CASES: 256
  # tests/chaos_testing.rs now defaults to 500 in source. CI sets the same
  # value explicitly so the canonical container lane, local preflight, and
  # manual deep overrides all agree on the intended baseline.
  CHAOS_ITERATIONS: 500

jobs:
  # Cost posture: pull requests run the fast devcontainer lane by default.
  # Expensive proof jobs are label-gated (`run-heavy-ci`, `run-mutants`,
  # `run-windows`, `run-loom`, `run-chaos`) or manual-profile gated. This
  # workflow intentionally has no scheduled heavy runs; full mutation is too
  # expensive to let it starve PR feedback without an operator explicitly
  # asking for the `heavy` proof profile.
  #
  # Push runs on main repeat exactly the always-on PR set (the six ci-fast
  # lanes, rustdoc, meta-gate, wasm, fuzz replay/smoke, gauntlet bite) — no
  # heavy surfaces. The label-gated jobs stay label/profile-gated: a push
  # event has no PR label context, so those conditions are simply false.
  rust-changed:
    name: Detect Rust-relevant changes
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.detect.outputs.rust }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          fetch-depth: 0
      - id: detect
        shell: bash
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "rust=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          base="${{ github.event.pull_request.base.sha }}"
          # FAIL CLOSED: this detector gates every rigor lane (mutation smoke,
          # gauntlet bite, fuzz replay). If `git diff` errors or comes back EMPTY
          # — e.g. the base object is missing or the merge-ref diff hiccups — we
          # must NOT silently skip those gates. Run them. Only an explicit,
          # non-empty diff with zero matching paths marks a PR as non-Rust.
          changed="$(git diff --name-only "$base" HEAD 2>/dev/null || true)"
          if [ -z "$changed" ]; then
            echo "detect: empty/unavailable diff against base $base — failing closed to rust=true"
            echo "rust=true" >> "$GITHUB_OUTPUT"
          elif printf '%s\n' "$changed" | grep -qE '^(bpk-lib/|\.devcontainer/|\.github/workflows/ci\.yml|bpk-lib/\.cargo/)'; then
            echo "rust=true" >> "$GITHUB_OUTPUT"
          else
            echo "rust=false" >> "$GITHUB_OUTPUT"
          fi

  # ── CI fast fan-out ────────────────────────────────────────────────────────
  # The fast bundle used to be ONE serial job (~36 min measured); it is now six
  # parallel lane jobs plus the `ci-fast-linux` summary below. Each lane runs
  # `cargo xtask ci-fast --lane <name>` — the same code path as the local serial
  # `cargo xtask ci-fast`, with one lane per runner. Hosted OSS runners make the
  # extra total compute free; wall-clock is bounded by the slowest lane instead
  # of the sum. Lane placement is enforced: the anti-rebury assertion in
  # tools/integrity/src/ci_parity.rs requires every lane to exist here as an
  # always-on (rust-changed-gated, never label-gated) job AND to stay wired into
  # the serial `ci_fast()` dispatch, and INV-CANONICAL-CONTAINER-CI requires
  # each lane to run through the checked-in devcontainer.
  #
  # Docs-only escape hatch (applies to every lane): a PR that changes ONLY root
  # markdown/docs (nothing under bpk-lib/, .devcontainer/, or ci.yml) reports
  # rust=false from the fail-closed `rust-changed` detector, so the compile
  # lanes are skipped rather than paying a devcontainer build for a prose edit.
  # Keyed on the rust flag ONLY — never a label — so it can never be used to
  # re-bury a gate on a Rust-touching PR (the meta-gate watches for label-gated
  # `if:` reburial).
  ci-fast-check:
    name: CI fast — check + deny (ubuntu-devcontainer)
    runs-on: ubuntu-latest
    needs: [rust-changed]
    if: needs.rust-changed.outputs.rust == 'true'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: ci-fast-check
          workspaces: bpk-lib
      - uses: ./.github/actions/setup-devcontainer
      - name: Version pins, format, checks, dependency gates
        env:
          BATPAK_DEVCONTAINER_IMAGE: batpak-devcontainer:ci
          BATPAK_DEVCONTAINER_SKIP_BUILD: "1"
        run: bash ./scripts/run-in-devcontainer.sh 'cargo xtask ci-fast --lane check'

  ci-fast-lint:
    name: CI fast — clippy (ubuntu-devcontainer)
    runs-on: ubuntu-latest
    needs: [rust-changed]
    if: needs.rust-changed.outputs.rust == 'true'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: ci-fast-lint
          workspaces: bpk-lib
      - uses: ./.github/actions/setup-devcontainer
      - name: Clippy with denied warnings (workspace + family)
        env:
          BATPAK_DEVCONTAINER_IMAGE: batpak-devcontainer:ci
          BATPAK_DEVCONTAINER_SKIP_BUILD: "1"
        run: bash ./scripts/run-in-devcontainer.sh 'cargo xtask ci-fast --lane lint'

  ci-fast-test:
    name: CI fast — tests (ubuntu-devcontainer)
    runs-on: ubuntu-latest
    needs: [rust-changed]
    if: needs.rust-changed.outputs.rust == 'true'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: ci-fast-test
          workspaces: bpk-lib
      - uses: ./.github/actions/setup-devcontainer
      - name: Workspace nextest
        env:
          BATPAK_DEVCONTAINER_IMAGE: batpak-devcontainer:ci
          BATPAK_DEVCONTAINER_SKIP_BUILD: "1"
        run: bash ./scripts/run-in-devcontainer.sh 'cargo xtask ci-fast --lane test'

  ci-fast-test-docs:
    # Split from ci-fast-test: warm-cache measurement (PR #221) put the nextest
    # lane at 22m44s — the fan-out critical path — with ~4 min of doctest +
    # family-crate tail. On its own runner this tail overlaps nextest instead of
    # serializing after it, bounding PR wall-clock near the coverage floor.
    name: CI fast — doctests + family tests (ubuntu-devcontainer)
    runs-on: ubuntu-latest
    needs: [rust-changed]
    if: needs.rust-changed.outputs.rust == 'true'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: ci-fast-test-docs
          workspaces: bpk-lib
      - uses: ./.github/actions/setup-devcontainer
      - name: Doctests, family tests
        env:
          BATPAK_DEVCONTAINER_IMAGE: batpak-devcontainer:ci
          BATPAK_DEVCONTAINER_SKIP_BUILD: "1"
        run: bash ./scripts/run-in-devcontainer.sh 'cargo xtask ci-fast --lane test-docs'

  ci-fast-contracts:
    name: CI fast — machine law + contract gates (ubuntu-devcontainer)
    runs-on: ubuntu-latest
    needs: [rust-changed]
    if: needs.rust-changed.outputs.rust == 'true'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: ci-fast-contracts
          workspaces: bpk-lib
      - uses: ./.github/actions/setup-devcontainer
      - name: Templates, traceability, structural, public-api, leak-scan, doctor, receipts
        env:
          BATPAK_DEVCONTAINER_IMAGE: batpak-devcontainer:ci
          BATPAK_DEVCONTAINER_SKIP_BUILD: "1"
        run: bash ./scripts/run-in-devcontainer.sh 'cargo xtask ci-fast --lane contracts'

  ci-fast-coverage:
    # The single instrumented llvm-cov run is BOTH the blocking threshold-80
    # floor and the per-PR coverage report: the lane enforces the floor and the
    # artifact upload below publishes the same run's report bundle. This retires
    # the old `coverage-baseline` job, which re-ran the entire instrumented
    # build a second time (~16 min serial after ci-fast) for a report-only copy
    # of the numbers this lane already produces.
    name: CI fast — coverage floor (ubuntu-devcontainer)
    runs-on: ubuntu-latest
    needs: [rust-changed]
    if: needs.rust-changed.outputs.rust == 'true'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: ci-fast-coverage
          workspaces: bpk-lib
      - uses: ./.github/actions/setup-devcontainer
      - name: Coverage floor (blocking)
        env:
          BATPAK_DEVCONTAINER_IMAGE: batpak-devcontainer:ci
          BATPAK_DEVCONTAINER_SKIP_BUILD: "1"
        run: bash ./scripts/run-in-devcontainer.sh 'cargo xtask ci-fast --lane coverage'
      - name: Upload coverage report artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: bpk-lib/target/xtask-cover/last-run/
          if-no-files-found: warn
          retention-days: 14

  ci-fast-linux:
    # Fan-in summary for the six ci-fast lanes. Keeps the historic job id so
    # (a) branch protection's required check stays `ci-fast-linux` and (b) every
    # downstream `needs: [ci-fast-linux, ...]` edge keeps working unchanged.
    # `if: always()` so it runs even when lanes fail or are skipped; the step
    # then FAILS unless every lane succeeded (or every lane was skipped because
    # rust-changed reported rust=false — the docs-only escape hatch).
    name: CI fast (ubuntu-devcontainer)
    runs-on: ubuntu-latest
    needs:
      [
        rust-changed,
        ci-fast-check,
        ci-fast-lint,
        ci-fast-test,
        ci-fast-test-docs,
        ci-fast-contracts,
        ci-fast-coverage,
      ]
    if: always()
    steps:
      - name: Aggregate lane results
        shell: bash
        env:
          DETECT_RESULT: ${{ needs.rust-changed.result }}
          RUST_CHANGED: ${{ needs.rust-changed.outputs.rust }}
          LANE_CHECK: ${{ needs.ci-fast-check.result }}
          LANE_LINT: ${{ needs.ci-fast-lint.result }}
          LANE_TEST: ${{ needs.ci-fast-test.result }}
          LANE_TEST_DOCS: ${{ needs.ci-fast-test-docs.result }}
          LANE_CONTRACTS: ${{ needs.ci-fast-contracts.result }}
          LANE_COVERAGE: ${{ needs.ci-fast-coverage.result }}
        run: |
          set -euo pipefail
          # FAIL CLOSED: the docs-only escape hatch is legitimate ONLY when the
          # rust-changed detector itself succeeded and explicitly said "false".
          # If the detector failed/was cancelled before writing a verdict, the
          # lanes were skipped for the WRONG reason and this summary must red.
          if [ "$DETECT_RESULT" != "success" ]; then
            echo "::error::rust-changed detector finished with result '${DETECT_RESULT}' — no verdict, failing closed"
            exit 1
          fi
          fail=0
          for lane in CHECK LINT TEST TEST_DOCS CONTRACTS COVERAGE; do
            var="LANE_${lane}"
            result="${!var}"
            echo "lane ${lane}: ${result}"
            if [ "$RUST_CHANGED" = "false" ]; then
              # Docs-only PR (explicit detector verdict): lanes are expected to
              # be skipped; anything that ran must still have succeeded.
              if [ "$result" != "success" ] && [ "$result" != "skipped" ]; then
                echo "::error::ci-fast lane ${lane} finished with result '${result}'"
                fail=1
              fi
            else
              if [ "$result" != "success" ]; then
                echo "::error::ci-fast lane ${lane} finished with result '${result}' on a Rust-touching PR"
                fail=1
              fi
            fi
          done
          exit "$fail"

  rustdoc-gate:
    # PR-time rustdoc gate: builds the workspace rustdoc with `-D warnings` so a
    # broken intra-doc link or malformed `///` fails CI BEFORE merge. The full
    # `docs` job (rustdoc + site) runs only on `main`, and `preflight`
    # (verify-linux) runs the same build only behind a heavy-CI label — neither
    # catches doc breakage on a normal PR. This job runs on every Rust-changed
    # PR, label-free, mirroring the family's `doc_deny_warnings`
    # (`cargo doc --workspace --all-features --no-deps` under
    # `RUSTDOCFLAGS=-D warnings`). `--all-features` is load-bearing (#178): the
    # 0.10.0 release-blocking stale intra-doc link hid behind the
    # `payload-encryption` feature and the default-features build never compiled
    # it. Gated on rust==true only, so a docs-only PR skips it (no Rust changed).
    name: Rustdoc link gate (ubuntu-devcontainer)
    runs-on: ubuntu-latest
    needs: [rust-changed]
    if: needs.rust-changed.outputs.rust == 'true'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: rustdoc-gate
          workspaces: bpk-lib
      - uses: ./.github/actions/setup-devcontainer
      - name: Build workspace rustdoc with denied warnings
        env:
          BATPAK_DEVCONTAINER_IMAGE: batpak-devcontainer:ci
          BATPAK_DEVCONTAINER_SKIP_BUILD: "1"
        run: bash ./scripts/run-in-devcontainer.sh 'RUSTDOCFLAGS="-D warnings" cargo doc --workspace --all-features --no-deps'

  public-api-bless:
    # Bless capability (manual only): regenerate the checked-in public-api
    # baselines and upload them so a drift can be adopted verbatim (download +
    # commit) instead of hand-edited. `cargo xtask public-api --bless-baseline`
    # writes the baselines IN PLACE to bpk-lib/traceability/public_api/*.txt,
    # which is bind-mounted from the runner workspace (unlike target/, which is
    # container-local and produces nothing to upload). Guarded to
    # `proof == 'bless'` so it never runs on PRs/fast runs and can never defeat
    # the check-baseline gate on the normal path.
    name: Bless public-api baselines (manual)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.proof == 'bless'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: public-api-bless
          workspaces: bpk-lib
      - uses: ./.github/actions/setup-devcontainer
      - name: Regenerate public-api baselines in place
        env:
          BATPAK_DEVCONTAINER_IMAGE: batpak-devcontainer:ci
          BATPAK_DEVCONTAINER_SKIP_BUILD: "1"
        run: bash ./scripts/run-in-devcontainer.sh 'cargo xtask public-api --bless-baseline'
      - name: Upload regenerated public-api baselines
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: public-api-baselines
          path: bpk-lib/traceability/public_api/
          if-no-files-found: warn

  meta-gate:
    # Agent-safety meta-gate (P1-4, "raccoon with commit access"): blocks a diff
    # that WEAKENS the assurance machinery (lowers a threshold, raises a cap, adds
    # a waiver entry, re-buries a gate, deletes a red fixture, downgrades an
    # assurance level) unless a human applied the `gauntlet-weaken-approved` label
    # AND a `GAUNTLET-WEAKEN-OK:` commit trailer is present (plus a second-author
    # trailer for L4 blast radius). Needs full history (`fetch-depth: 0`) to
    # resolve the merge-base and read commit trailers. The classifier is pure and
    # unit/mutation-tested in tools/integrity/src/meta_gate.rs.
    name: Agent-safety meta-gate
    runs-on: ubuntu-latest
    needs: [rust-changed]
    if: needs.rust-changed.outputs.rust == 'true'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: meta-gate
          workspaces: bpk-lib
      - uses: ./.github/actions/setup-devcontainer
      - name: Classify diff for unapproved weakenings
        env:
          BATPAK_DEVCONTAINER_IMAGE: batpak-devcontainer:ci
          BATPAK_DEVCONTAINER_SKIP_BUILD: "1"
          # The meta-gate READS these; CI cannot self-apply the approval label.
          GAUNTLET_PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
          GAUNTLET_PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          GAUNTLET_PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: bash ./scripts/run-in-devcontainer.sh 'cargo xtask meta-gate --base "${GAUNTLET_PR_BASE_SHA:-origin/main}"'

  verify-linux:
    # No `needs:` edge on the fast lanes: this deep bundle re-runs the whole
    # fast surface itself (preflight → ci → ci-fast), consumes none of the lane
    # jobs' artifacts, and is label/profile-gated — serializing it behind the
    # fast fan-out only added wall-clock on heavy runs.
    name: Verify (ubuntu-devcontainer)
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'workflow_dispatch' &&
        (github.event.inputs.proof == 'verify' ||
         github.event.inputs.proof == 'loom' ||
         github.event.inputs.proof == 'heavy')) ||
      (github.event_name == 'pull_request' &&
        (contains(github.event.pull_request.labels.*.name, 'run-heavy-ci') ||
         contains(github.event.pull_request.labels.*.name, 'run-loom')))
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: verify
          workspaces: bpk-lib
      - uses: ./.github/actions/setup-devcontainer
      - name: Canonical preflight proof bundle
        env:
          BATPAK_DEVCONTAINER_IMAGE: batpak-devcontainer:ci
          BATPAK_DEVCONTAINER_SKIP_BUILD: "1"
        run: bash ./scripts/run-in-devcontainer.sh 'cargo xtask preflight'

  ci-windows:
    name: CI Windows surface (native)
    runs-on: windows-latest
    if: >-
      (github.event_name == 'workflow_dispatch' &&
        (github.event.inputs.proof == 'windows' ||
         github.event.inputs.proof == 'heavy')) ||
      (github.event_name == 'pull_request' &&
        (contains(github.event.pull_request.labels.*.name, 'run-heavy-ci') ||
         contains(github.event.pull_request.labels.*.name, 'run-windows')))
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@1a3a6d54512beeaffd394f8d516ca16f2c506a20 # 1.97.0
        with:
          toolchain: 1.97.0
          components: clippy,rustfmt
      - uses: taiki-e/install-action@b8cecb83565409bcc297b2df6e77f030b2a468d5 # v2
        with:
          tool: cargo-nextest@0.9.132
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: ci-windows
          workspaces: bpk-lib
      - name: Native Windows surface lane
        working-directory: bpk-lib
        run: cargo xtask ci-windows-surface

  # Check-only wasm32-unknown-unknown embedding surface (issue #164): keeps
  # core + syncbat (and core's payload-encryption feature) compiling for the
  # target. Deliberately check-only — no test runner, JS host, or wasm tooling
  # — so the lane stays cheap enough to run on every Rust-touching PR.
  wasm-surface:
    name: wasm32 embedding surface (check-only)
    runs-on: ubuntu-latest
    needs: [rust-changed]
    if: needs.rust-changed.outputs.rust == 'true'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@1a3a6d54512beeaffd394f8d516ca16f2c506a20 # 1.97.0
        with:
          toolchain: 1.97.0
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: wasm-surface
          workspaces: bpk-lib
      - name: Check-only wasm32 embedding surface
        working-directory: bpk-lib
        run: cargo xtask wasm-surface

  feature-isolation:
    runs-on: ubuntu-latest
    # Artifact-independent (own cache, own compile); gated by label/profile +
    # rust-changed only so it starts at t=0 on heavy runs instead of queuing
    # behind the fast lanes and verify.
    needs: [rust-changed]
    if: >-
      needs.rust-changed.outputs.rust == 'true' &&
      ((github.event_name == 'workflow_dispatch' &&
        (github.event.inputs.proof == 'verify' ||
         github.event.inputs.proof == 'heavy')) ||
       (github.event_name == 'pull_request' &&
        contains(github.event.pull_request.labels.*.name, 'run-heavy-ci')))
    strategy:
      fail-fast: false
      matrix:
        features:
          - ""
          - "--features dangerous-test-hooks"
          - "--no-default-features"
          - "--no-default-features --features dangerous-test-hooks"
          - "--all-features"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: bpk-lib
      - uses: ./.github/actions/setup-devcontainer
      - name: Feature-isolation test matrix
        env:
          BATPAK_DEVCONTAINER_IMAGE: batpak-devcontainer:ci
          BATPAK_DEVCONTAINER_SKIP_BUILD: "1"
        run: bash ./scripts/run-in-devcontainer.sh "cargo test ${{ matrix.features }}"

  qf-bv-equivalence:
    # Kernel plan §4: discharge the admission-circuit equivalence proof with a pinned
    # EXTERNAL SMT solver (cloud-only; never the local potato). The pure SMT generator
    # is unit-tested on every PR; THIS job runs the #[ignore]d solver harness on the
    # heavy lane. Runs outside the devcontainer so it can install the solvers directly.
    name: QF_BV admission equivalence (pinned z3 + cvc5)
    runs-on: ubuntu-latest
    # Artifact-independent of the fast lanes; see feature-isolation.
    needs: [rust-changed]
    if: >-
      needs.rust-changed.outputs.rust == 'true' &&
      ((github.event_name == 'workflow_dispatch' &&
        (github.event.inputs.proof == 'verify' ||
         github.event.inputs.proof == 'heavy')) ||
       (github.event_name == 'pull_request' &&
        contains(github.event.pull_request.labels.*.name, 'run-heavy-ci')))
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@1a3a6d54512beeaffd394f8d516ca16f2c506a20 # 1.97.0
        with:
          toolchain: 1.97.0
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: bpk-lib
      - name: Install z3 (primary pinned solver)
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y z3
          z3 --version
      - name: Install cvc5 (independent solver, HARD-required)
        run: |
          set -euo pipefail
          # Pinned 1.2.0. Release assets are arch-suffixed zips
          # (cvc5-Linux-x86_64-static.zip with bin/cvc5 inside); the old bare
          # `cvc5-Linux-static` binary asset no longer exists (404 on every
          # release since 1.1) — first surfaced when this heavy-only lane ran.
          CVC5_VERSION=1.2.0
          curl -fsSL -o "$RUNNER_TEMP/cvc5.zip" \
            "https://github.com/cvc5/cvc5/releases/download/cvc5-${CVC5_VERSION}/cvc5-Linux-x86_64-static.zip"
          unzip -q "$RUNNER_TEMP/cvc5.zip" -d "$RUNNER_TEMP/cvc5-dist"
          CVC5_BIN="$RUNNER_TEMP/cvc5-dist/cvc5-Linux-x86_64-static/bin/cvc5"
          chmod +x "$CVC5_BIN"
          "$CVC5_BIN" --version
          echo "BVISOR_CVC5=$CVC5_BIN" >> "$GITHUB_ENV"
      - name: QF_BV qualification gate (two-solver UNSAT + planted SAT + non-vacuity)
        working-directory: bpk-lib
        env:
          BVISOR_Z3: z3
          BVISOR_PROOF_RECEIPT: ${{ runner.temp }}/qf-bv-budget-receipt.hex
        run: cargo test -p bvisor --features qf-bv -- --ignored --nocapture
      - name: Archive the proof receipt (gate evidence)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: qf-bv-budget-proof-receipt
          path: ${{ runner.temp }}/qf-bv-budget-receipt.hex
          if-no-files-found: error

  smoke-consumers:
    name: Smoke (quickstart, packaged consumer, template)
    runs-on: ubuntu-latest
    # Artifact-independent onboarding smoke; label/profile-gated, no needs edge.
    if: >-
      (github.event_name == 'workflow_dispatch' &&
        (github.event.inputs.proof == 'verify' ||
         github.event.inputs.proof == 'heavy')) ||
      (github.event_name == 'pull_request' &&
        contains(github.event.pull_request.labels.*.name, 'run-heavy-ci'))
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: bpk-lib
      - uses: ./.github/actions/setup-devcontainer
      - name: Run onboarding smoke checks
        env:
          BATPAK_DEVCONTAINER_IMAGE: batpak-devcontainer:ci
          BATPAK_DEVCONTAINER_SKIP_BUILD: "1"
        run: |
          bash ./scripts/run-in-devcontainer.sh '
            cargo xtask quickstart &&
            cargo xtask consumer-smoke &&
            cargo xtask templates
          '

      # P1-3b anti-vacuous gate: the packaged-consumer build runs batpak's
      # build.rs with the repo invariant surface ABSENT. Packaged-sensitive
      # build-time lints must then record SKIPPED_PACKAGED receipts, NOT a
      # (vacuous) PASS. This distinguishes "ran and passed" from "did not run".
      # consumer-smoke builds into bpk-lib/target/consumer-smoke-build, so
      # build.rs writes receipts to
      # bpk-lib/target/consumer-smoke-build/debug/gauntlet-receipts/<slug>.json.
      - name: Assert packaged build-time lints SKIPPED (not vacuously PASSED)
        run: |
          set -euo pipefail
          dir="bpk-lib/target/consumer-smoke-build/debug/gauntlet-receipts"
          fail=0
          for slug in no-async-runtime no-dead-code-silencers allow-justifications pub-items-have-tests; do
            f="$dir/$slug.json"
            if [ ! -f "$f" ]; then
              echo "::error::missing packaged receipt $f — the packaged build-time lint did not record its skip (silent vacuous pass)"
              fail=1
              continue
            fi
            verdict=$(jq -r '.verdict' "$f")
            echo "$slug -> $verdict"
            if [ "$verdict" != "SKIPPED_PACKAGED" ]; then
              echo "::error::packaged receipt $f has verdict '$verdict'; expected SKIPPED_PACKAGED. A PASS here would be vacuous (the lint cannot truly run without the repo invariant surface)."
              fail=1
            fi
          done
          if [ "$fail" -ne 0 ]; then
            exit 1
          fi
          echo "All packaged-sensitive build-time lints recorded explicit SKIPPED_PACKAGED receipts."

  mutants-smoke:
    name: Mutation smoke (${{ matrix.seam }})
    runs-on: ubuntu-latest
    # OPT-IN (2026-07-02, re-annotated 2026-07-12 for free hosted runners): the
    # seam smoke matrix stays label-gated — the cost is now wall-clock and
    # runner-concurrency (free-plan cap: 20 concurrent jobs), not dollars. Add
    # the `run-mutants` PR label to run it, or dispatch `proof=mutants`/`heavy`.
    # It is still `--in-diff` (only your changed lines); it simply does not
    # fire behind your back on every push. Mutation coverage of a PR is one
    # label away — deliberate, not automatic.
    if: >-
      ((github.event_name == 'pull_request' &&
        contains(github.event.pull_request.labels.*.name, 'run-mutants')) ||
       (github.event_name == 'workflow_dispatch' &&
        (github.event.inputs.proof == 'mutants' ||
         github.event.inputs.proof == 'heavy'))) &&
      needs.rust-changed.outputs.rust == 'true'
    needs: [rust-changed]
    strategy:
      fail-fast: false
      matrix:
        seam:
          - writer-commit
          - cursor-delivery
          - projection-flow
          - projection-fusion
          - segment-scan
          - hash-chain-replay
          - frontier-wait-durable
          - frontier-append-gate
          - event-payload-registry-validator
          - platform-backend
          - testing-ledger-structural-lint
          - integrity-graders
          - syncbat-runtime-dispatch
          - syncbat-register-catalog
          - syncbat-subscription-runtime
          - netbat-boundary-protocol
          - fork-isolation
          - import-reapply
          - lane-branch
          - lane-frontier
          - bvisor-admission
          - bvisor-report-seal
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          # Diff-scoped mutation needs the PR base reachable so we can write the
          # base..head patch that cargo-mutants consumes via --in-diff.
          fetch-depth: 0
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: mutants-smoke-${{ matrix.seam }}
          workspaces: bpk-lib
      - uses: ./.github/actions/setup-devcontainer
      - name: Resolve PR diff for diff-scoped mutation
        # Only pull requests carry a base sha; on workflow_dispatch (manual
        # mutants/heavy runs) `github.event.pull_request.base.sha` is empty and
        # `git diff "" HEAD` exits 128 before xtask can run. Skip this step for
        # manual runs and leave BATPAK_MUTANTS_DIFF unset so resolve_smoke_diff's
        # local merge-base fallback derives the scope instead.
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          # Write the base..head patch onto the mounted workspace so the path
          # resolves identically inside the devcontainer. `-C bpk-lib --relative`
          # emits `crates/...` paths relative to bpk-lib/ (where cargo-mutants
          # runs); without it the diff carries `bpk-lib/...` prefixes that
          # cargo-mutants' --in-diff matcher silently drops.
          mkdir -p bpk-lib/target
          git -C bpk-lib diff --relative "$base" HEAD > bpk-lib/target/smoke-diff.patch
          # Plumb the patch path only when we actually wrote one. The smoke step
          # hard-fails if BATPAK_MUTANTS_DIFF points at a missing file, so manual
          # runs must leave it unset to take the local fallback path.
          echo "BATPAK_MUTANTS_DIFF=/workspace/batpak/bpk-lib/target/smoke-diff.patch" >> "$GITHUB_ENV"
          echo "wrote $(wc -l < bpk-lib/target/smoke-diff.patch) lines of diff for base $base"
      - name: Mutation smoke (critical seam, diff-scoped)
        env:
          BATPAK_DEVCONTAINER_IMAGE: batpak-devcontainer:ci
          BATPAK_DEVCONTAINER_SKIP_BUILD: "1"
        run: bash ./scripts/run-in-devcontainer.sh 'cargo xtask mutants smoke --seam ${{ matrix.seam }}'

  mutants-smoke-repo-wide:
    name: Mutation smoke (repo-wide ratchet)
    runs-on: ubuntu-latest
    # OPT-IN, same `run-mutants` label as the smoke matrix above. Runs only the
    # single repo-wide shard 0/48 (REPO_WIDE_SMOKE_SHARD, lanes.rs); on free
    # 4-vCPU hosted runners expect it to take several hours of wall-clock. The
    # heavy full 0/12..11/12 matrix (mutants-full) stays behind the explicit
    # `run_full_mutation_matrix` opt-in.
    if: >-
      needs.rust-changed.outputs.rust == 'true' &&
      ((github.event_name == 'workflow_dispatch' &&
        (github.event.inputs.proof == 'mutants' ||
         github.event.inputs.proof == 'heavy')) ||
       (github.event_name == 'pull_request' &&
        contains(github.event.pull_request.labels.*.name, 'run-mutants')))
    needs: [rust-changed]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: mutants-smoke-repo-wide
          workspaces: bpk-lib
      - uses: ./.github/actions/setup-devcontainer
      - name: Mutation smoke (repo-wide shard 0/48)
        env:
          BATPAK_DEVCONTAINER_IMAGE: batpak-devcontainer:ci
          BATPAK_DEVCONTAINER_SKIP_BUILD: "1"
        run: bash ./scripts/run-in-devcontainer.sh 'cargo xtask mutants smoke --repo-wide-only'

  loom-schedule-proof:
    name: Loom schedule proof
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'workflow_dispatch' &&
        (github.event.inputs.proof == 'loom' ||
         github.event.inputs.proof == 'heavy')) ||
      (github.event_name == 'pull_request' &&
        (contains(github.event.pull_request.labels.*.name, 'run-heavy-ci') ||
         contains(github.event.pull_request.labels.*.name, 'run-loom')))
    # Artifact-independent of the fast lanes and verify; label/profile-gated.
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: bpk-lib
      - uses: ./.github/actions/setup-devcontainer
      - name: Bounded loom schedule proofs
        env:
          BATPAK_DEVCONTAINER_IMAGE: batpak-devcontainer:ci
          BATPAK_DEVCONTAINER_SKIP_BUILD: "1"
        run: bash ./scripts/run-in-devcontainer.sh 'cargo xtask loom'

  mutants-full:
    runs-on: ubuntu-latest
    # COST GUARD: the 24-shard whole-repo matrix is the heaviest surface in the
    # repo (~5h/shard measured on 16-vCPU runners; on today's free 4-vCPU hosted
    # runners a shard likely exceeds the 6-hour job cap — hosted re-sharding is
    # owned by the Muterprater arm, #211). It does not ride `proof=heavy` alone;
    # it needs the explicit opt-in flag too, so `heavy` gives you every
    # validation lane without the whale unless you mean it.
    # Deliberate run: gh workflow run ci.yml -f proof=heavy -f run_full_mutation_matrix=yes
    if: >-
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.proof == 'heavy' &&
      github.event.inputs.run_full_mutation_matrix == 'yes'
    strategy:
      fail-fast: false
      matrix:
        surface:
          - all-features
          - no-default-features
        shard:
          - 0/12
          - 1/12
          - 2/12
          - 3/12
          - 4/12
          - 5/12
          - 6/12
          - 7/12
          - 8/12
          - 9/12
          - 10/12
          - 11/12
    name: Mutation full (${{ matrix.surface }} shard ${{ matrix.shard }})
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: mutants-full-${{ matrix.surface }}-${{ matrix.shard }}
          workspaces: bpk-lib
      - uses: ./.github/actions/setup-devcontainer
      - name: Full mutation shard
        env:
          BATPAK_DEVCONTAINER_IMAGE: batpak-devcontainer:ci
          BATPAK_DEVCONTAINER_SKIP_BUILD: "1"
        run: bash ./scripts/run-in-devcontainer.sh 'cargo xtask mutants full --surface ${{ matrix.surface }} --shard ${{ matrix.shard }}'

  chaos-proof:
    name: Chaos (dm-flakey)
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'workflow_dispatch' &&
        (github.event.inputs.proof == 'chaos' ||
         github.event.inputs.proof == 'heavy')) ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'run-chaos'))
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@1a3a6d54512beeaffd394f8d516ca16f2c506a20 # 1.97.0
        with:
          toolchain: 1.97.0
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: bpk-lib
      - name: Install block-device chaos tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends dmsetup e2fsprogs util-linux
      - name: dm-flakey harness
        working-directory: bpk-lib
        env:
          BATPAK_RUN_CHAOS: "1"
        run: cargo test --features dangerous-test-hooks --test chaos -- --test-threads=1

  fuzz-replay:
    # GAUNT-FUZZ-1 — the PR-BLOCKING fuzz-replay gate (the gateable, deterministic
    # half). NOT cargo-fuzz: a normal `#[test]` on the standard devcontainer
    # toolchain that re-runs every committed corpus + regression input through the
    # real `batpak::__fuzz::*` decode entry points and asserts none panics. Fast
    # (<1s/file), hardware-independent, no nightly/sanitizer needed — so it rides
    # the always-on PR lane (gated only by the rust-changed detector), unlike the
    # nightly cargo-fuzz `fuzz-smoke` below. The `fuzz_replay_covers_every_target`
    # meta-test inside the same binary reds if any declared fuzz `[[bin]]` loses its
    # regression fixture or dispatcher wiring, so the gate can't be hollowed out.
    name: Fuzz replay (committed corpus)
    runs-on: ubuntu-latest
    needs: [rust-changed]
    if: >-
      needs.rust-changed.outputs.rust == 'true' &&
      (github.event_name == 'pull_request' ||
       github.event_name == 'push' ||
       (github.event_name == 'workflow_dispatch' &&
        (github.event.inputs.proof == 'verify' ||
         github.event.inputs.proof == 'chaos' ||
         github.event.inputs.proof == 'heavy')))
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: fuzz-replay
          workspaces: bpk-lib
      - uses: ./.github/actions/setup-devcontainer
      - name: Replay committed fuzz corpus + regressions (no panic)
        env:
          BATPAK_DEVCONTAINER_IMAGE: batpak-devcontainer:ci
          BATPAK_DEVCONTAINER_SKIP_BUILD: "1"
        run: >-
          bash ./scripts/run-in-devcontainer.sh
          'cargo test -p batpak --test fuzz_replay --features dangerous-test-hooks'

  gauntlet-red-fixtures-bite:
    # GAUNTLET-TQL — "prove the gates bite". The gate registry records each blocking
    # gate's anti-vacuous red fixture; for ProductionFlip fixtures (S2/S3 durability
    # sentinels + the perf-alloc budget) anti-vacuity means the fixture FAILS under
    # `--cfg gauntlet_red_fixture` (its expectation flips to the illegal/old
    # behavior). This lane rebuilds those fixtures under the cfg and asserts each
    # test actually reds — a fixture that PASSES under the cfg has no real red half,
    # so its gate's blocking authority is laundered. The fixture list comes from the
    # registry (`batpak-integrity production-flip-fixtures`), so this lane and the
    # registry can never drift. Runs every PR (gated only by rust-changed), like the
    # fuzz-replay gate above.
    name: Gauntlet — prove the gates bite
    runs-on: ubuntu-latest
    needs: [rust-changed]
    if: >-
      needs.rust-changed.outputs.rust == 'true' &&
      (github.event_name == 'pull_request' ||
       github.event_name == 'push' ||
       (github.event_name == 'workflow_dispatch' &&
        (github.event.inputs.proof == 'verify' ||
         github.event.inputs.proof == 'chaos' ||
         github.event.inputs.proof == 'heavy')))
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: gauntlet-bite
          workspaces: bpk-lib
      - uses: ./.github/actions/setup-devcontainer
      - name: Prove every ProductionFlip red fixture reds under the cfg
        env:
          BATPAK_DEVCONTAINER_IMAGE: batpak-devcontainer:ci
          BATPAK_DEVCONTAINER_SKIP_BUILD: "1"
        run: >-
          bash ./scripts/run-in-devcontainer.sh
          'cargo xtask prove-gates-bite'

  fuzz-smoke:
    # Gauntlet Phase 0B — SENTINEL S1: cargo-fuzz smoke on `frame_decode`.
    #
    # Always-on, EVERY-PR offensive breaker (gated only by the rust-changed
    # detector — no label required, mirroring how S2/S3 ride the always-on test
    # lane). Runs the libFuzzer target for a short fixed 60s budget against the
    # committed seed corpus + RED regression. Bounds memory with `-rss_limit_mb`
    # so a crafted huge length-prefix frame OOMing the box is a CRASH, not a
    # silent hang. cargo-fuzz needs the nightly toolchain (sancov + ASan +
    # rust-src for -Z build-std of the sanitizer runtime), so this job uses a
    # native nightly toolchain instead of the 1.97.0 devcontainer lane.
    name: Fuzz smoke (frame_decode)
    runs-on: ubuntu-latest
    needs: [rust-changed]
    if: >-
      needs.rust-changed.outputs.rust == 'true' &&
      ((github.event_name == 'workflow_dispatch' &&
        (github.event.inputs.proof == 'verify' ||
         github.event.inputs.proof == 'chaos' ||
         github.event.inputs.proof == 'heavy')) ||
       github.event_name == 'pull_request' ||
       github.event_name == 'push')
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      # Same pinned dtolnay/rust-toolchain commit as the other lanes; the
      # toolchain is selected by the `toolchain:` input, not the action tag.
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # v1 (nightly via input)
        with:
          toolchain: nightly
          components: rust-src
          # ASan/libFuzzer require a dynamically-linked (glibc) target: musl is
          # statically linked (+crt-static) and the sanitizer refuses to link
          # against it ("sanitizer is incompatible with statically linked
          # libc"). Pin gnu explicitly so the target std is present.
          targets: x86_64-unknown-linux-gnu
      - uses: taiki-e/install-action@b8cecb83565409bcc297b2df6e77f030b2a468d5 # v2
        with:
          tool: cargo-fuzz@0.13.2
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: fuzz-smoke
          workspaces: bpk-lib/fuzz
      # cargo-fuzz defaults `--target` to the triple its own prebuilt binary was
      # compiled for (via the `current_platform` crate), which the taiki-e
      # install-action resolves to the statically-linked musl triple — fatal for
      # ASan. Pin the gnu target on BOTH build and run so the sanitizer links.
      # GAUNT-FUZZ-1: build EVERY declared fuzz target so a target that stops
      # compiling under the nightly + sanitizer toolchain fails the lane (the
      # devcontainer fuzz-replay lane only proves they build on the stable
      # toolchain). `cargo fuzz build` with no target name builds all `[[bin]]`s.
      - name: Build all fuzz targets
        working-directory: bpk-lib/fuzz
        run: cargo +nightly fuzz build --target x86_64-unknown-linux-gnu
      # Always-on PR smoke: a short frame_decode run for fast signal on the
      # store's hottest decode surface. The full per-target sweep below is the
      # deep (heavy/chaos dispatch) lane.
      - name: Fuzz smoke (frame_decode, 60s, RSS-bounded)
        working-directory: bpk-lib/fuzz
        # `corpus/frame_decode` seeds the run; libFuzzer also replays the RED
        # regression dir. -max_total_time caps the budget; -rss_limit_mb makes an
        # unbounded-allocation regression a hard crash.
        run: >-
          cargo +nightly fuzz run frame_decode --target x86_64-unknown-linux-gnu --
          -max_total_time=60
          -rss_limit_mb=2048
      # Deep sweep (scheduled/heavy): loop EVERY target for a longer budget,
      # seeded by its committed corpus and replaying its RED regressions. Only on
      # the heavy/chaos workflow_dispatch profiles so PR cost stays bounded.
      - name: Fuzz sweep (all targets, RSS-bounded)
        if: >-
          github.event_name == 'workflow_dispatch' &&
          (github.event.inputs.proof == 'chaos' || github.event.inputs.proof == 'heavy')
        working-directory: bpk-lib/fuzz
        # -max_total_time is per target; keep the gnu-target pin for the
        # sanitizer link on every invocation.
        run: |
          for target in \
            frame_decode segment_header sidx_entry checkpoint_data \
            checkpoint_snapshot_v6 mmap_entry cache_meta projection_state \
            hidden_ranges mmap_index_load sidx_footer; do
            echo "::group::fuzz $target"
            cargo +nightly fuzz run "$target" --target x86_64-unknown-linux-gnu -- \
              -max_total_time=900 \
              -rss_limit_mb=2048
            echo "::endgroup::"
          done
      - name: Upload fuzz crash artifacts on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fuzz-crashes
          path: bpk-lib/fuzz/artifacts/
          if-no-files-found: ignore
          retention-days: 14

  docs:
    runs-on: ubuntu-latest
    needs: [verify-linux]
    if: github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: bpk-lib
      - uses: ./.github/actions/setup-devcontainer
      - name: Build root docs site + rustdoc
        env:
          BATPAK_DEVCONTAINER_IMAGE: batpak-devcontainer:ci
          BATPAK_DEVCONTAINER_SKIP_BUILD: "1"
        run: bash ./scripts/run-in-devcontainer.sh 'cargo xtask docs'
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: bpk-lib/target/site
      - id: deploy
        # `continue-on-error: true` because the deploy step will hard-fail
        # with `404 Not Found` until GitHub Pages is enabled in repository
        # Settings → Pages (deployment source: "GitHub Actions"). The build
        # and upload steps above are the meaningful gates — they catch
        # rustdoc and root-doc site breakage. The deploy itself is the LAST mile and
        # should not block CI on a one-time admin setup that the codebase
        # cannot fix from inside Rust source. Once Pages is enabled, this
        # step succeeds silently and `continue-on-error` becomes a no-op.
        # See: https://github.com/freebatteryfactory/batpak/settings/pages
        continue-on-error: true
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
