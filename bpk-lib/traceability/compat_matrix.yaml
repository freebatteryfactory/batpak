# Compat matrix — on-disk forward-compatibility downgrade discipline.
#
# Each row is a (writer_version, reader_version, feature_bits) tuple and the
# single LEGAL outcome when a reader at `reader_version` opens an on-disk
# artifact written at `writer_version`. The owner's rule: old/foreign data
# either OPENS, or fails with ONE canonical typed error — never silent
# corruption and never a silent downgrade-from-scan.
#
# Loaded by: bpk-lib/crates/core/tests/compat_matrix.rs (table-driven gate).
# The gate forges an on-disk artifact at `writer_version` (reusing the public
# store seed + the byte-level version-field forge used by
# gauntlet_s2_future_version_refusal) and asserts the outcome.
#
# Fields:
#   format          — on-disk format the row covers. Today:
#                       mmap-index        (index.fbati,            MMAP_INDEX_VERSION)
#                       checkpoint        (index.ckpt,             CHECKPOINT_VERSION)
#                       idempotency-index (index.idemp,            IDEMP_VERSION)
#                       visibility-ranges (visibility_ranges.fbv,  VISIBILITY_RANGES_VERSION)
#                       fork-evidence       (fork_evidence.fbev,     FORK_EVIDENCE_REPORT_SCHEMA_VERSION)
#                       import-provenance   (import_provenance.fbip,   IMPORT_PROVENANCE_SCHEMA_VERSION)
#                       store-meta          (store.meta,             STORE_META_VERSION)
#                     The driver panics on an unknown format so a new format needs
#                     a row + a forge arm, not a silent skip.
#   writer_version  — the format version stamped into the forged artifact.
#   reader_version  — the format version the live binary supports. MUST equal the
#                     live const for the self-row; the gate cross-checks this so a
#                     bump to the on-disk version with no matching row is caught.
#   feature_bits    — reserved capability bitset (0 today; future feature gating).
#   expected_outcome — one of:
#                       OpensOK
#                       CanonicalRefusal:MmapFutureVersion
#                       CanonicalRefusal:CheckpointFutureVersion
#                       CanonicalRefusal:IdempotencyFutureVersion
#                       CanonicalRefusal:HiddenRangesFutureVersion
#                       CanonicalRefusal:ForkEvidenceFutureVersion
#                       CanonicalRefusal:ImportProvenanceFutureVersion
#                       CanonicalRefusal:StoreMetadataFutureVersion
#   fixture_path    — relative-to-crate descriptor of the forged artifact. Forged
#                     on the fly from a seeded store (kept tiny: 4 events / a
#                     cancelled fence), so the path is the in-temp artifact name,
#                     not a checked-in blob.
#
# DEFERRED FORMATS (honest skip — tracked here until typed *FutureVersion arms land):
#   - segment (.fbat): its version field is msgpack-encoded inside the header
#     (not a fixed byte offset), so the shared version-field forge does not
#     apply, AND a future-version segment already fails closed via
#     `CorruptSegment` with no silent-degrade path (segments are the durable
#     bottom layer, never rebuilt from elsewhere). No new refusal was needed.
#   - staged compaction names (`.compact-new` staged replacements, `.compact-src`
#     retained sources): transient namespace artifacts of the compaction commit
#     protocol, not versioned open-time formats. Their crash legality
#     (old-or-new-or-refusal at every publication boundary) is owned by
#     INV-COMPACTION-NAMESPACE-COMMIT and the deterministic crash-fixture corpus,
#     not by (writer_version, reader_version) rows.
#   - compaction.pending marker (canonical versioned binary: magic + u16 version
#     + CRC32): a transaction artifact present only mid-compaction, absent in a
#     store at rest, so the seeded-store forge cannot materialize one. Its
#     MarkerFutureVersion / MarkerCorrupt refusals fire on the RECOVERY path and
#     are proven by the crash-fixture corpus, not by an open-time
#     (writer_version, reader_version) row here.

rows:
  # Self-row: a reader opens an artifact written at its own live version. This
  # is the OpensOK baseline AND the staleness tripwire — `writer_version` and
  # `reader_version` here MUST equal the live MMAP_INDEX_VERSION, so a bump to
  # the on-disk version without updating this row makes the gate fail.
  - format: mmap-index
    writer_version: 5
    reader_version: 5
    feature_bits: 0
    expected_outcome: OpensOK
    fixture_path: index.fbati

  # Forged future-version row: a future writer's artifact (live + 1) must be a
  # canonical typed refusal, never a silent rebuild-from-scan.
  - format: mmap-index
    writer_version: 6
    reader_version: 5
    feature_bits: 0
    expected_outcome: CanonicalRefusal:MmapFutureVersion
    fixture_path: index.fbati

  # ── checkpoint (index.ckpt) ──────────────────────────────────────────────
  # Backward (new reader / own-version artifact): opens through the checkpoint
  # cold-start fast path.
  - format: checkpoint
    writer_version: 6
    reader_version: 6
    feature_bits: 0
    expected_outcome: OpensOK
    fixture_path: index.ckpt
  # Forward (old reader / future artifact): a future-version checkpoint is a
  # canonical refusal propagated out of cold-start, NOT a silent rebuild. Before
  # the cure the planner fell through to rebuild-from-scan (silent degrade);
  # this row reds if that regresses.
  - format: checkpoint
    writer_version: 7
    reader_version: 6
    feature_bits: 0
    expected_outcome: CanonicalRefusal:CheckpointFutureVersion
    fixture_path: index.ckpt

  # ── idempotency-index (index.idemp) ──────────────────────────────────────
  # Self-row: the live v2 AUTHORITY image (lineage + generation token +
  # diagnostic anchor + entries; GAUNT-IDEMPOTENCY-AUTHORITY, #189) restores on
  # open when its token matches the `store.meta` authorization.
  - format: idempotency-index
    writer_version: 2
    reader_version: 2
    feature_bits: 0
    expected_outcome: OpensOK
    fixture_path: index.idemp
  # Backward (legacy migration): a genuine v1 image (bare entries, no binding)
  # opens on the v2 reader ONLY in the pre-expectation migration state — the
  # seeded store holds no user idempotency obligations, so `store.meta`
  # records no authorization and the legacy admission path applies. It
  # upgrades to v2 at the next flush that has an obligation to publish.
  - format: idempotency-index
    writer_version: 1
    reader_version: 2
    feature_bits: 0
    expected_outcome: OpensOK
    fixture_path: index.idemp
  # Forward: a future-version sidecar is a hard typed refusal — a reader can
  # never reconstruct a durable-dedup format it predates (silently degrading to
  # empty would lose cross-compaction dedup correctness).
  - format: idempotency-index
    writer_version: 3
    reader_version: 2
    feature_bits: 0
    expected_outcome: CanonicalRefusal:IdempotencyFutureVersion
    fixture_path: index.idemp

  # ── store-meta (store.meta) ───────────────────────────────────────────────
  # Self-row: the live v1 lineage-metadata sidecar (#205) loads on open. v1 is
  # the COMPLETED INITIAL schema, not a migration target: store.meta has never
  # shipped, so there is no supported earlier reader and no abandoned-draft body
  # to tolerate. The compaction commit record this cut adds
  # (last_compaction_commit, required-present in the encoding — value may be
  # None, but NO `#[serde(default)]` draft compat) grows the v1 body WITHOUT a
  # version bump precisely because no prior v1 body exists in the wild; a v1 body
  # missing a required field is CORRUPTION (fail-closed family), never a
  # tolerated older shape. Hence there is deliberately NO additive
  # `1->1`-with-missing-fields tolerance row — it would assert a compatibility
  # the schema does not offer.
  - format: store-meta
    writer_version: 1
    reader_version: 1
    feature_bits: 0
    expected_outcome: OpensOK
    fixture_path: store.meta
  # Forward: a future-version store.meta is the canonical typed refusal —
  # metadata is an AUTHORITY sidecar (never reminted, never rebuilt), so an
  # unreadable-by-this-reader version must never silently degrade.
  - format: store-meta
    writer_version: 2
    reader_version: 1
    feature_bits: 0
    expected_outcome: CanonicalRefusal:StoreMetadataFutureVersion
    fixture_path: store.meta

  # ── visibility-ranges (visibility_ranges.fbv) ────────────────────────────
  # Self-row: own-version (live VISIBILITY_RANGES_VERSION = 2) cancelled-ranges
  # metadata restores on open. The v1→v2 bump added an optional `lane_ranges`
  # field with `#[serde(default)]`, so the body is version-number-only
  # compatible (a v1-shaped body decodes at v2 with empty lane ranges).
  - format: visibility-ranges
    writer_version: 2
    reader_version: 2
    feature_bits: 0
    expected_outcome: OpensOK
    fixture_path: visibility_ranges.fbv
  # Bonus backward-compat: a v1 artifact still opens on the v2 reader — the
  # loader accepts the supported range 1..=VISIBILITY_RANGES_VERSION (see
  # hidden_ranges.rs version-handling), so prior on-disk metadata is honored.
  - format: visibility-ranges
    writer_version: 1
    reader_version: 2
    feature_bits: 0
    expected_outcome: OpensOK
    fixture_path: visibility_ranges.fbv
  # Forward: a future-version artifact (live + 1 = 3) is a DISTINCT canonical
  # refusal (not the remediable HiddenRangesCorrupt path) — treating it as
  # generic corruption or silently empty would risk resurrecting cancelled
  # events.
  - format: visibility-ranges
    writer_version: 3
    reader_version: 2
    feature_bits: 0
    expected_outcome: CanonicalRefusal:HiddenRangesFutureVersion
    fixture_path: visibility_ranges.fbv

  # ── fork-evidence (fork_evidence.fbev) ───────────────────────────────────
  - format: fork-evidence
    writer_version: 1
    reader_version: 1
    feature_bits: 0
    expected_outcome: OpensOK
    fixture_path: fork_evidence.fbev
  - format: fork-evidence
    writer_version: 2
    reader_version: 1
    feature_bits: 0
    expected_outcome: CanonicalRefusal:ForkEvidenceFutureVersion
    fixture_path: fork_evidence.fbev

  # ── import-provenance (import_provenance.fbip) ───────────────────────────
  - format: import-provenance
    writer_version: 1
    reader_version: 1
    feature_bits: 0
    expected_outcome: OpensOK
    fixture_path: import_provenance.fbip
  - format: import-provenance
    writer_version: 2
    reader_version: 1
    feature_bits: 0
    expected_outcome: CanonicalRefusal:ImportProvenanceFutureVersion
    fixture_path: import_provenance.fbip
