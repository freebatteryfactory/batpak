    disposition: intentional_public
    witness: crates/core/tests/substrate_additions.rs

  # ── 0.11.0 compaction-namespace-commit cut (additive, minor pre-1.0) ──
  # Idempotency-authority export/restore seam (#188).
  - item: Store::export_idempotency_authority
    disposition: intentional_public
    witness: crates/core/tests/idempotency_authority_export_restore.rs
  - item: Store::restore_idempotency_authority
    disposition: intentional_public
    witness: crates/core/tests/idempotency_authority_export_restore.rs
    note: >-
      Offline closed-directory associated fn (config + export -> Result), NOT a
      &self method: acquires the store-dir lock, refuses while a pending compaction
      marker is unresolved, mints a fresh local AuthorityImageId, republishes through
      the canonical authority protocol. The two-door live-adopt design and a separate
      restore_idempotency_authority_offline were never shipped (one offline door).
  - item: IdempotencyAuthorityExport (+ accessor methods)
    disposition: intentional_public
    witness: crates/core/tests/idempotency_authority_export_restore.rs
    note: One canonical opaque authority image; manual redacted Debug, no embedder-visible tuple schema.
  - item: StoreError::IdempotencyRestoreRefused + IdempotencyRestoreRefusal
    disposition: intentional_public
    witness: crates/core/tests/idempotency_authority_restore_refusals.rs
    note: >-
      Additive StoreError variant (StoreError is #[non_exhaustive] — not a break) plus
      its typed refusal enum; PendingCompactionUnresolved replaces the earlier
      UnauthorizedGeneration refusal (offline-restore contract, A13).

  # Compaction namespace-commit recovery surface (#177/#195 slice).
  - item: StoreError::CompactionRecoveryRefused + CompactionRecoveryRefusal
    disposition: intentional_public
    witness: crates/core/tests/store_error_contract.rs
    note: >-
      Additive StoreError variant (#[non_exhaustive]) + its typed refusal enum; carries
      the marker_path and the canonical refusal kind (MarkerCorrupt / MarkerFutureVersion /
      LegacyMarkerUnsupported / PendingTransactionUnresolved / etc.).

  # Published error-handling taxonomy (#180) — moved out of the private testkit classifier.
  - item: StoreError::handling_class + HandlingClass
    disposition: intentional_public
    witness: crates/core/tests/store_error_contract.rs
    note: >-
      pub enum HandlingClass + pub fn handling_class(&self) -> HandlingClass; exhaustive,
      wildcard-free (repo-wide wildcard denial forces an arm on every future variant).

  # Non-opening forensic recovery inspection (#180) — reads marker + store.meta without
  # constructing Store<Open> or mutating disk.
  - item: Store::inspect_recovery_state + RecoveryInspection
    disposition: intentional_public
    witness: crates/core/tests/recovery_inspection.rs
    note: Public-safe field types only (hex id strings / paths / enums; no internal tuples).

  # Conformance-harness feature (A12): the clean external StoreFs-conformance surface,
  # additive and feature-gated (non-default). Appears only in the all-features baseline.
  - item: conformance-harness feature — store::conformance corpus + factories + ShadowFs (CrashOp/SimOp/SimOpKind)
    disposition: intentional_public
    witness: crates/core/tests/store_fs_conformance_corpus.rs
    note: >-
      Feature-gated (conformance-harness), non-default; dangerous-test-hooks implies it.
      ShadowFs is the public namespace-truth crash simulator; SimFs and the __sim
      namespace matrix stay internal under dangerous-test-hooks (not part of this surface).
  - item: __sim namespace-recovery matrix exports (dangerous-test-hooks)
    disposition: intentional_public
    witness: crates/core/tests/namespace_recovery_matrix.rs
    note: Feature-gated (dangerous-test-hooks), non-default; test machinery in the all-features baseline only.

  # Branded identity types (A3) — surface only where they appear in public export/inspection fields.
  - item: store::CompactionId / store::AuthorityImageId (as_u128)
    disposition: intentional_public
    witness: crates/core/tests/recovery_inspection.rs
    note: >-
      Branded newtypes over u128; no From/Into between brands or with raw u128, never
      compared across brands. Public only where they surface in export/inspection fields.

