# BatPAK semver-check --strict checklist (baseline: crates.io batpak 0.7.0).
# 0.8.0 is the pre-1.0 breaking-change boundary; no compatibility shims retained.
# 0.8.1 is additive only: new public ProjectionEvidenceRegistry (+ store
# re-exports) backing the four evidence.* NETBAT ops. No new breaking-change
# rules over 0.8.0; additive wire ops are a patch pre-1.0.
package: batpak
baseline_version: 0.7.0
current_version: 0.11.0
witness: target/semver-public-api/semver-checks.txt
summary: "15 major semver-check rules are classified in the 0.8.0 witness; prelude narrowing adds intentional enum/function/struct/trait alias removals. All classified intentional_0_8 or path_relocation unless noted. 0.8.1 adds only new public items (additive, patch pre-1.0). 0.8.3 adds the schema-evolution + durable-idempotency surface (event::upcast module, EventPayload::PAYLOAD_VERSION, EventHeader::payload_version, EventKind::is_reserved, TypedDecodeError::{FutureVersion,Upcast}, IdempotencyRetention/OverflowPolicy + config setters, IdempotencyKey::for_operation, new StoreError variants) — additive, patch pre-1.0; netbat/syncbat baselines re-normalized to canonical std/core paths under the current toolchain (no API change). 0.10.0 is the reserved pre-1.0 breaking window: #[non_exhaustive] lands on TypedDecodeError and ReceiptVerificationError (rule enum_marked_non_exhaustive — intentional; downstream exhaustive matches need a wildcard arm once), and the additive surface grows the StoreFs seam family (StoreFs, RealFs, CowStrategyUsed, PositionedReadError, ParentDirSyncAdmission, StoreConfig::with_fs), the store-free receipt verification surface (receipt_verify: verify_receipt_claim, ReceiptClaim, ReceiptVerifyingKeys; SigningKey::{key_id,public_key_bytes}), and the pluggable keyset seam (KeysetBackend, FileKeysetBackend, StoreConfig::with_keyset_backend). 0.11.0 is the compaction-namespace-commit cut (additive, minor pre-1.0): the public idempotency-authority export/restore seam (Store::export_idempotency_authority, the offline associated fn Store::restore_idempotency_authority, IdempotencyAuthorityExport, StoreError::IdempotencyRestoreRefused + IdempotencyRestoreRefusal), the compaction-recovery refusal surface (StoreError::CompactionRecoveryRefused + CompactionRecoveryRefusal), the published error handling taxonomy (StoreError::handling_class + HandlingClass, #180), non-opening forensics (Store::inspect_recovery_state + RecoveryInspection, #180), the new conformance-harness feature exposing store::conformance + ShadowFs (CrashOp/SimOp/SimOpKind), and the branded CompactionId/AuthorityImageId identity types where they surface in public export/inspection fields. Feature-gated items appear only in the all-features baseline section; the two-door live-adopt restore design was never shipped (one offline door lands instead)."

